# XcodeGen spec for the flextunnel iOS POC.
#
# Generate the Xcode project with:   xcodegen generate
# Then open Flextunnel.xcodeproj, select your signing Team, and run.
#
# Unlike ezvpn-ios there is NO Network Extension: flextunnel runs a SOCKS5
# listener inside the app process and a SwiftUI WebView (WebPage) is routed
# through it via WebPage.Configuration.websiteDataStore.proxyConfigurations
# (iOS 26+). No special entitlement and no paid Apple Developer account are
# required; it also runs in the Simulator.
#
# The Rust static library + header live in vendor/, populated by
#   scripts/fetch-vendor.sh
# which by default downloads a pinned GitHub release (reproducible), or with
# --local symlinks the sibling's fresh ../flextunnel/dist/ios build for FFI dev.
# Run it once before `xcodegen generate`.
name: Flextunnel

options:
  bundleIdPrefix: com.andrewtheguy.flextunnel
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    # ---- SET THIS to your Apple Developer Team ID, or set it in Xcode. ----
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  FlextunnelApp:
    type: application
    platform: iOS
    sources:
      - Sources/FlextunnelApp
    dependencies:
      # Static-library XCFramework with both the device and Simulator arm64
      # slices (fetched into vendor/ by scripts/fetch-vendor.sh). Xcode links
      # whichever slice matches the selected destination. embed:false — static
      # libs aren't embedded.
      - framework: vendor/libflextunnel.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewtheguy.flextunnel
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Sources/FlextunnelApp/FlextunnelApp.entitlements
        # Explicit Info.plist so we can carry an App Transport Security exception
        # (cleartext http:// is blocked by default, which silently fails loads
        # like http://server.ezvpn:8000 before they ever reach the proxy).
        INFOPLIST_FILE: Sources/FlextunnelApp/Info.plist
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_OBJC_BRIDGING_HEADER: Sources/FlextunnelApp/Bridging-Header.h
        # flextunnel.h (for the bridging header) sits alongside the XCFramework
        # in vendor/ (fetch-vendor.sh puts it there). The Rust lib itself comes
        # from the XCFramework dependency above; here we only add its system
        # dependencies (same set ezvpn links).
        HEADER_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/vendor
        OTHER_LDFLAGS:
          - $(inherited)
          - -lresolv
          - -lc++
          - -framework
          - Security
          - -framework
          - SystemConfiguration
