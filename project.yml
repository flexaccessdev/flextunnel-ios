# XcodeGen spec for the flextunnel iOS POC.
#
# Generate the Xcode project with:   xcodegen generate
# Then open Flextunnel.xcodeproj, select your signing Team, and run.
#
# Unlike ezvpn-ios there is NO Network Extension: flextunnel runs a SOCKS5
# listener inside the app process and a SwiftUI WebView (WebPage) is routed
# through it via WebPage.Configuration.websiteDataStore.proxyConfigurations
# (iOS 26+). No special entitlement and no paid Apple Developer account are
# required; it also runs in the Simulator.
#
# The Rust static library + header come from the local Swift package in
# Packages/Flextunnel — a binary target that downloads the pinned release zip by
# URL+checksum, or a local build for FFI dev. See the `packages:` section below
# and Packages/Flextunnel/Package.swift.
name: Flextunnel

options:
  bundleIdPrefix: com.andrewtheguy.flextunnel
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

# Per-developer signing lives in Developer.xcconfig (gitignored). Copy
# Developer.xcconfig.sample to Developer.xcconfig and set DEVELOPMENT_TEAM so
# Xcode/xcodebuild builds sign automatically — same pattern as ../s3player-app.
configFiles:
  Debug: Developer.xcconfig
  Release: Developer.xcconfig

packages:
  # Local package (Packages/Flextunnel) whose binary target downloads the pinned
  # release zip by URL+checksum (reproducible), or links a local build when
  # FLEXTUNNEL_LOCAL_XCFRAMEWORK is set (FFI dev). No vendored copy, no fetch script.
  Flextunnel:
    path: Packages/Flextunnel

# Ship one shared scheme that builds/runs the app (which embeds the widget
# extension). The widget is Live-Activity-only: running its own scheme fails with
# "Failed to get descriptors" because there's no home-screen widget to launch —
# so we don't generate a scheme for it. Always run FlextunnelApp.
schemes:
  FlextunnelApp:
    build:
      targets:
        FlextunnelApp: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

settings:
  base:
    # DEVELOPMENT_TEAM comes from Developer.xcconfig (see configFiles above),
    # which #include?s the gitignored per-developer Developer.local.xcconfig.
    # Not set here: a build setting would override the xcconfig value.
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  FlextunnelApp:
    type: application
    platform: iOS
    sources:
      - Sources/FlextunnelApp
      # Shared with the widget extension: the Live Activity attributes/state model
      # must be compiled into both bundles.
      - Sources/Shared
    dependencies:
      # Static-library XCFramework delivered via the sibling's Swift package
      # binary target (downloads the pinned release zip by URL+checksum). Xcode
      # links whichever slice matches the selected destination.
      - package: Flextunnel
        product: libflextunnel
      # WidgetKit extension that renders the tunnel Live Activity (lock screen +
      # Dynamic Island). Embedded into the app's PlugIns.
      - target: FlextunnelWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewtheguy.flextunnel
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Sources/FlextunnelApp/FlextunnelApp.entitlements
        # Explicit Info.plist so we can carry an App Transport Security exception
        # (cleartext http:// is blocked by default, which silently fails loads
        # like http://server.ezvpn:8000 before they ever reach the proxy).
        INFOPLIST_FILE: Sources/FlextunnelApp/Info.plist
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_OBJC_BRIDGING_HEADER: Sources/FlextunnelApp/Bridging-Header.h
        # No HEADER_SEARCH_PATHS needed: SPM puts the binary target's embedded
        # Headers/ dir on the consumer's search path, so the bridging header's
        # `#import "flextunnel.h"` resolves automatically. The Rust lib comes from
        # the package binary target; here we only add its system dependencies
        # (same set ezvpn links).
        OTHER_LDFLAGS:
          - $(inherited)
          - -lresolv
          - -lc++
          - -framework
          - Security
          - -framework
          - SystemConfiguration

  # WidgetKit extension: renders the tunnel Live Activity. No Rust/FFI, no
  # Network Extension — it only draws the status the app pushes via ActivityKit.
  FlextunnelWidgets:
    type: app-extension
    platform: iOS
    sources:
      - Sources/FlextunnelWidgets
      - Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewtheguy.flextunnel.widgets
        INFOPLIST_FILE: Sources/FlextunnelWidgets/Info.plist
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "1"
